<html>
  <body>
    <h1>Config</h1>
    <p>Server admin actions</p>
    <button id="deploy-button" type="button">Pull Latest from GitHub</button>
    <p id="deploy-status"></p>
    <script>
      const deployButton = document.getElementById("deploy-button");
      const deployStatus = document.getElementById("deploy-status");

      deployButton.addEventListener("click", async () => {
        deployButton.disabled = true;
        deployStatus.textContent = "Deploy started...";

        try {
          const response = await fetch("/admin/deploy", {
            method: "POST",
          });

          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.error || "Deploy failed.");
          }

          deployStatus.textContent = "Deploy succeeded. Server should now be up to date.";
        } catch (error) {
          deployStatus.textContent = error.message;
        } finally {
          deployButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
