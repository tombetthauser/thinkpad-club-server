<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chase.com</title>
    <!--
      Use the button to flip between real time and silly chaos — see the script.
    -->
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: white;
        font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
      }

      .page-box {
        max-width: 720px;
        margin: 24px auto;
        padding: 24px 28px 32px;
        border: 3px dashed #6ec4e8;
        border-radius: 16px;
        background: white;
        box-sizing: border-box;
      }

      .site-title {
        color: #1a1a1a;
        font-size: 1.75rem;
        margin: 0 0 12px;
        font-weight: bold;
      }

      .mode-row {
        margin: 0 0 20px;
      }

      .mode-btn {
        font: inherit;
        font-size: 1rem;
        padding: 8px 16px;
        border: 3px solid #222;
        border-radius: 8px;
        background: #e8f7fc;
        cursor: pointer;
      }

      .mode-btn:hover {
        background: #d4eef8;
      }

      /*
        Two columns: left = logo + name, right = big clock box (like the drawing).
      */
      .columns {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: stretch;
      }

      .col-left {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-width: 130px;
        flex: 0 0 auto;
      }

      /* Small box: blue top, brown bottom with “Special” */
      .special-box {
        border: 3px solid #222;
        border-radius: 8px;
        overflow: hidden;
        width: 124px;
      }

      .special-top {
        background: #2563c7;
        color: #fff;
        min-height: 48px;
        padding: 8px 6px;
        font-size: 0.65rem;
        line-height: 1.3;
      }

      /* Fake “scribbles” like white marker on blue */
      .scribble {
        opacity: 0.9;
        letter-spacing: 1px;
      }

      .special-bottom {
        background: #7a5c2e;
        color: #111;
        text-align: center;
        font-weight: bold;
        padding: 12px 8px;
        font-size: 1.05rem;
      }

      .name-chase {
        margin: 16px 0 0;
        font-size: 1.25rem;
        font-weight: bold;
        color: #111;
      }

      .col-right {
        flex: 1 1 240px;
        border: 3px solid #222;
        border-radius: 10px;
        padding: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 280px;
      }

      /* Brown round clock face */
      .clock-face {
        position: relative;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: #6b4423;
        box-shadow: inset 0 0 0 4px rgba(0, 0, 0, 0.15);
      }

      .clock-face.is-crazy {
        animation: clock-shake 0.12s ease-in-out infinite;
      }

      @keyframes clock-shake {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(2px, -3px) rotate(1.5deg);
        }
        50% {
          transform: translate(-3px, 2px) rotate(-2deg);
        }
        75% {
          transform: translate(3px, 1px) rotate(1deg);
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }

      /* Numbers in white circles — each li is rotated around the center */
      .dial-nums {
        position: absolute;
        inset: 0;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .dial-nums li {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 26px;
        height: 26px;
        margin: -13px;
        transform: rotate(var(--turn)) translateY(-86px);
      }

      .dial-nums li span {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: #fff;
        border-radius: 50%;
        border: 2px solid #333;
        font-size: 0.75rem;
        font-weight: bold;
        transform: rotate(calc(-1 * var(--turn)));
      }

      /* Hands: grow from center, spin with JavaScript */
      .hand {
        position: absolute;
        left: 50%;
        bottom: 50%;
        transform-origin: bottom center;
        background: #111;
        border-radius: 2px;
      }

      .hand.hour {
        width: 8px;
        height: 52px;
        margin-left: -4px;
        z-index: 2;
      }

      .hand.minute {
        width: 6px;
        height: 72px;
        margin-left: -3px;
        z-index: 3;
      }

      .hand.second {
        width: 2px;
        height: 82px;
        margin-left: -1px;
        background: #222;
        z-index: 4;
      }

      .clock-cap {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 14px;
        height: 14px;
        margin: -7px;
        background: #111;
        border-radius: 50%;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div class="page-box">
      <p><a href="/chase/games">Scratch games</a></p>
      <h1 class="site-title">Chase.com</h1>

      <p class="mode-row">
        <button type="button" class="mode-btn" id="mode-toggle" aria-pressed="false">
          Crazy mode
        </button>
      </p>

      <div class="columns">
        <div class="col-left">
          <div class="special-box">
            <div class="special-top">
              <span class="scribble">∿∿∿ ∿∿ ∿∿∿∿</span>
            </div>
            <div class="special-bottom">Special</div>
          </div>
          <p class="name-chase">Chase</p>
        </div>

        <div class="col-right">
          <div class="clock-face" id="clock-face" aria-label="Analog clock">
            <ol class="dial-nums">
              <!-- --turn is degrees; 12 is at the top (0°) -->
              <li style="--turn: 0deg"><span>12</span></li>
              <li style="--turn: 30deg"><span>1</span></li>
              <li style="--turn: 60deg"><span>2</span></li>
              <li style="--turn: 90deg"><span>3</span></li>
              <li style="--turn: 120deg"><span>4</span></li>
              <li style="--turn: 150deg"><span>5</span></li>
              <li style="--turn: 180deg"><span>6</span></li>
              <li style="--turn: 210deg"><span>7</span></li>
              <li style="--turn: 240deg"><span>8</span></li>
              <li style="--turn: 270deg"><span>9</span></li>
              <li style="--turn: 300deg"><span>10</span></li>
              <li style="--turn: 330deg"><span>11</span></li>
            </ol>
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="minute-hand"></div>
            <div class="hand second" id="second-hand"></div>
            <div class="clock-cap" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var crazyMode = false;
      var chaosStart = performance.now();
      var hourEl = document.getElementById("hour-hand");
      var minuteEl = document.getElementById("minute-hand");
      var secondEl = document.getElementById("second-hand");
      var clockFace = document.getElementById("clock-face");
      var modeBtn = document.getElementById("mode-toggle");

      function updateModeUi() {
        clockFace.classList.toggle("is-crazy", crazyMode);
        modeBtn.textContent = crazyMode ? "Normal time" : "Crazy mode";
        modeBtn.setAttribute("aria-pressed", crazyMode ? "true" : "false");
        clockFace.setAttribute(
          "aria-label",
          crazyMode ? "Analog clock (crazy mode)" : "Analog clock (real time)"
        );
      }

      function tickFrame(now) {
        var hourDeg;
        var minuteDeg;
        var secondDeg;

        if (crazyMode) {
          var t = (now - chaosStart) / 1000;
          hourDeg =
            t * 47 +
            Math.sin(t * 0.7) * 120 +
            Math.sin(t * 2.1) * 80 +
            Math.cos(t * 3.3) * 200;
          minuteDeg =
            -t * 311 +
            Math.cos(t * 1.4) * 250 +
            Math.sin(t * 5.2) * 400 +
            Math.sin(t * 0.25) * 90;
          secondDeg =
            t * 2520 +
            Math.sin(t * 18) * 720 +
            Math.cos(t * 7.7) * 360 +
            (Math.random() - 0.5) * 40;
        } else {
          var d = new Date();
          var s = d.getSeconds();
          var ms = d.getMilliseconds();
          var m = d.getMinutes() + (s + ms / 1000) / 60;
          var h = (d.getHours() % 12) + m / 60;
          hourDeg = h * 30;
          minuteDeg = m * 6;
          secondDeg = (s + ms / 1000) * 6;
        }

        hourEl.style.transform = "rotate(" + hourDeg + "deg)";
        minuteEl.style.transform = "rotate(" + minuteDeg + "deg)";
        secondEl.style.transform = "rotate(" + secondDeg + "deg)";

        requestAnimationFrame(tickFrame);
      }

      modeBtn.addEventListener("click", function () {
        crazyMode = !crazyMode;
        if (crazyMode) {
          chaosStart = performance.now();
        }
        updateModeUi();
      });

      updateModeUi();
      requestAnimationFrame(tickFrame);
    </script>
  </body>
</html>
