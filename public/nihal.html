<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nihal Sanghera — Basketball</title>
    <!--
      This page is one file: HTML (the words and boxes) + CSS (the colors and layout).
      Students: try changing a color or a number and refresh the page to see what happens!
    -->
    <style>
      /* --- Page background --- */
      body {
        margin: 0;
        min-height: 100vh;
        background: white;
        font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
      }

      /*
        .paper is one big box that acts like the sheet of paper in the drawing.
        We use a dashed border so it looks a little like a frame.
      */
      .paper {
        max-width: 720px;
        margin: 24px auto;
        padding: 20px 28px 32px;
        border: 3px dashed #c0c0c0;
        background: white;
        box-sizing: border-box;
      }

      /* Purple name and number — like the marker on the drawing */
      .name {
        color: #6b2d9e;
        font-size: 1.75rem;
        margin: 0 0 4px;
        font-weight: bold;
      }

      .number {
        color: #6b2d9e;
        font-size: 1.5rem;
        margin: 0 0 24px;
        font-weight: bold;
      }

      /*
        .scene uses flexbox: two columns side by side.
        "display: flex" puts the hoop and the players in a row.
      */
      .scene {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
      }

      /* ----- Left side: basketball hoop (mostly red) ----- */
      .hoop {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .backboard {
        width: 100px;
        height: 70px;
        background: #e8e8e8;
        border: 4px solid #c41e3a;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .backboard-inner {
        width: 44px;
        height: 36px;
        border: 3px solid #c41e3a;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Little star shape in the middle of the backboard */
      .rim-mark {
        color: #111;
        font-size: 1.4rem;
        line-height: 1;
      }

      .net {
        width: 56px;
        height: 48px;
        margin-top: -2px;
        border-left: 3px solid #c41e3a;
        border-right: 3px solid #c41e3a;
        border-bottom: 3px solid #c41e3a;
        background: repeating-linear-gradient(
            90deg,
            transparent,
            transparent 6px,
            #c41e3a 6px,
            #c41e3a 7px
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 6px,
            #c41e3a 6px,
            #c41e3a 7px
          );
        background-color: rgba(255, 255, 255, 0.5);
      }

      .pole {
        width: 14px;
        height: 140px;
        background: #c41e3a;
        border-radius: 2px;
      }

      /* ----- Right side: two players and the ball (purple) ----- */
      .players {
        display: flex;
        align-items: flex-end;
        gap: 28px;
        padding-bottom: 8px;
      }

      /*
        Each person is a few divs stacked:
        .head = circle, .body = line, .arm = short line, etc.
      */
      .person {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #6b2d9e;
      }

      .person.big {
        transform: scale(1.15);
        transform-origin: bottom center;
      }

      .head {
        width: 28px;
        height: 28px;
        border: 3px solid #6b2d9e;
        border-radius: 50%;
        background: white;
        position: relative;
      }

      /* Simple smile: two dots and a curve using text (easy for kids to spot in HTML) */
      .face {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        font-size: 0.65rem;
        line-height: 1;
        text-align: center;
        width: 100%;
      }

      .body {
        width: 4px;
        height: 44px;
        background: #6b2d9e;
        margin-top: 2px;
      }

      /* Row under the head: body and ball sit side by side (like holding the ball) */
      .upper {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
      }

      .arm {
        width: 26px;
        height: 3px;
        background: #6b2d9e;
      }

      .arm.reach-left {
        transform: rotate(-40deg);
      }

      .arm.reach-right {
        transform: rotate(40deg);
      }

      .arms-row {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .legs {
        display: flex;
        gap: 10px;
        margin-top: 2px;
      }

      .leg {
        width: 3px;
        height: 28px;
        background: #6b2d9e;
      }

      /* Basketball: circle + cross lines */
      .ball {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid #6b2d9e;
        background: white;
        position: relative;
        flex-shrink: 0;
      }

      .ball::before,
      .ball::after {
        content: "";
        position: absolute;
        background: #6b2d9e;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .ball::before {
        width: 2px;
        height: 28px;
      }

      .ball::after {
        width: 28px;
        height: 2px;
      }
    </style>
  </head>
  <body>
    <div class="paper">
      <p><a href="/nihal/games">Scratch games</a></p>
      <!-- Your name and number at the top, like the drawing -->
      <h1 class="name">Nihal Sanghera</h1>
      <p class="number">57</p>

      <div class="scene">
        <!-- Left: hoop, net, pole -->
        <div class="hoop">
          <div class="backboard">
            <div class="backboard-inner">
              <span class="rim-mark">✱</span>
            </div>
          </div>
          <div class="net" aria-hidden="true"></div>
          <div class="pole" aria-hidden="true"></div>
        </div>

        <!-- Right: players and ball -->
        <div class="players">
          <!-- Bigger player: body + ball side by side -->
          <div class="person big">
            <div class="head">
              <span class="face">· ·<br />⌣</span>
            </div>
            <div class="upper">
              <div class="body"></div>
              <div class="ball" title="basketball"></div>
            </div>
            <div class="legs">
              <div class="leg"></div>
              <div class="leg"></div>
            </div>
          </div>

          <!-- Smaller player: arms reaching toward the ball -->
          <div class="person">
            <div class="head">
              <span class="face">· ·<br />⌣</span>
            </div>
            <div class="arms-row">
              <div class="arm reach-left"></div>
              <div class="arm reach-right"></div>
            </div>
            <div class="body"></div>
            <div class="legs">
              <div class="leg"></div>
              <div class="leg"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
